version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sprintix
      POSTGRES_PASSWORD: sprintix
      POSTGRES_DB: sprintix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprintix"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: